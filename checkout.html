<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>TechnoShop | Оформление заказа</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    .payment {
      margin: 15px 0;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #38bdf8;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .total {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    #successMsg {
      text-align: center;
      margin-top: 15px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🛒 TechnoShop Checkout</h1>

  <!-- Корзина -->
  <div class="card">
    <h2>Ваш заказ</h2>
    <div id="cartSummary"></div>
  </div>

  <!-- Данные -->
  <div class="card">
    <h2>Данные доставки</h2>

    <input type="text" id="name" placeholder="Ваше имя">
    <input type="tel" id="phone" placeholder="Телефон">
    <input type="text" id="address" placeholder="Адрес">

    <!-- Оплата -->
    <div class="payment">
      <label><input type="radio" name="payment" value="Kaspi" checked> Kaspi</label><br>
      <label><input type="radio" name="payment" value="Наличные"> Наличные</label><br>
      <label><input type="radio" name="payment" value="Карта"> Карта</label>
    </div>

    <button onclick="sendOrder()">Оформить заказ</button>

    <p id="successMsg"></p>
  </div>
</div>

<script src="main.js"></script>

</body>
</html>
