body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f5f5f7; }
header { background:#d7000f; color:white; padding:15px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 6px rgba(0,0,0,.15); }
header .logo { font-size:22px; font-weight:bold; letter-spacing:1px; }
header .search { flex:1; margin:0 20px; position:relative; }
.search input { width:260px; padding:10px 15px; border-radius:30px; border:none; box-shadow:0 2px 6px rgba(0,0,0,.1); outline:none; font-size:14px; }
.search-suggestions { position:absolute; top:45px; left:0; width:100%; background:white; border:1px solid #ccc; border-radius:10px; max-height:200px; overflow-y:auto; display:none; z-index:5; box-shadow:0 4px 12px rgba(0,0,0,.15); }
.search-suggestions div { padding:10px 15px; cursor:pointer; transition:0.2s; }
.search-suggestions div:hover { background:#f0f0f0; }

.categories { background:white; padding:10px 15px; display:flex; gap:15px; overflow-x:auto; box-shadow:0 2px 6px rgba(0,0,0,.05); border-radius:10px; margin:10px 20px; }
.categories span { cursor:pointer; font-size:15px; white-space:nowrap; padding:6px 12px; border-radius:20px; transition:0.2s; border:1px solid transparent; }
.categories span:hover, .categories .active { background:#d7000f; color:white; border-color:#d7000f; }

.filters { display:flex; gap:10px; margin:10px 20px; background:white; padding:10px 15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,.05); align-items:center; }
.filters label { font-size:14px; }
.filters input { width:80px; padding:6px 10px; border-radius:6px; border:1px solid #ccc; }

.filters button { padding:6px 12px; border:none; border-radius:20px; background:#d7000f; color:white; cursor:pointer; transition:0.2s; font-size:14px; }
.filters button:hover { background:#b2000b; }

.products { padding:20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; }
.card { background:white; padding:15px; border-radius:15px; transition:0.3s; cursor:pointer; border:1px solid transparent; box-shadow:0 2px 6px rgba(0,0,0,.05); }
.card:hover { border-color:#d7000f; transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,.1); }
.card img { width:100%; height:180px; object-fit:contain; border-radius:10px; }
.card .title { margin:10px 0 5px; font-size:15px; font-weight:600; }
.card .price { color:#d7000f; font-size:18px; font-weight:bold; }
.card button { margin-top:8px; padding:8px 12px; border:none; border-radius:20px; background:#d7000f; color:white; cursor:pointer; transition:0.2s; }
.card button:hover { background:#b2000b; }

.product-details { background:#fff3f3; padding:10px; border-radius:10px; margin-top:10px; font-size:14px; }
.product-details h4 { margin:5px 0; }
.product-details ul { margin:0; padding-left:20px; }
.review { margin-bottom:5px; }

/* Корзина */
.mini-cart { position:fixed; right:-400px; top:0; width: 350px; height:100%; background:white; box-shadow:-3px 0 10px rgba(0,0,0,.2); transition:0.35s; padding:20px; overflow-y:auto; z-index:10; border-radius:10px 0 0 10px; }
.mini-cart.open { right:0; }
.mini-cart h2 { margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px; }
.cart-item { display:flex; gap:10px; margin-bottom:15px; align-items:center; padding:5px 0; border-bottom:1px solid #f0f0f0; }
.cart-item img { width:60px; height:60px; object-fit:contain; border-radius:10px; }
.cart-item .qty { display:flex; gap:5px; align-items:center; }
.cart-item button { padding:4px 8px; cursor:pointer; border:none; border-radius:6px; background:#d7000f; color:white; transition:0.2s; }
.cart-item button:hover { background:#b2000b; }
.cart-total { display:flex; justify-content:space-between; font-weight:bold; font-size:16px; margin-top:10px; }
.checkout { background:#d7000f; color:white; padding:12px; text-align:center; border-radius:20px; margin-top:15px; cursor:pointer; font-weight:bold; transition:0.2s; }
.checkout:hover { background:#b2000b; }

/* Админ */
#admin-panel { position:fixed; top:60px; left:50%; transform:translateX(-50%); width:350px; background:white; padding:20px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,.3); z-index:999; display:none; }

#admin-panel button { width:100%; padding:10px; background:#d7000f; border:none; color:white; border-radius:8px; cursor:pointer; transition:0.2s; }
#admin-panel button:hover { background:#b2000b; }

let filteredProducts = [...products];
let openDetailsId = null;

// Рендер товаров
function render(list){
  const c = document.getElementById("products");
  c.innerHTML = "";
  list.forEach(p=>{
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${p.img}">
      <div class="title">${p.name}</div>
      <div class="price">${p.price.toLocaleString()} ₸</div>
      <button onclick="addToCart(${p.id}); event.stopPropagation()">В корзину</button>
      <div id="details-${p.id}" class="product-details" style="display:none;"></div>
    `;
    card.onclick = () => { toggleDetails(p.id); }
    c.appendChild(card);
  });
}

function toggleDetails(id){
  const detailsDiv = document.getElementById(`details-${id}`);
  if(openDetailsId && openDetailsId!==id){
    document.getElementById(`details-${openDetailsId}`).style.display='none';
  }
  if(detailsDiv.style.display==='none'){
    const p = products.find(x=>x.id===id);
    let html = `<p>${p.description||''}</p>`;
    if(p.specs){
      html += "<h4>Характеристики:</h4><ul>";
      p.specs.forEach(s=>html+="<li>"+s+"</li>");
      html+="</ul>";
    }
    if(p.reviews){
      html += "<h4>Отзывы:</h4><ul>";
      p.reviews.forEach(r=>html+=`<li class="review"><b>${r.name}</b>: ${r.text} (${r.rating}/5)</li>`);
      html+="</ul>";
    }
    detailsDiv.innerHTML = html;
    detailsDiv.style.display='block';
    openDetailsId = id;
  } else {
    detailsDiv.style.display='none';
    openDetailsId = null;
  }
}

// Категории
function filterCategory(cat){
  filteredProducts = (cat==='all') ? [...products] : products.filter(p=>p.category===cat);
  render(filteredProducts);
  document.querySelectorAll('.categories span').forEach(s=>s.classList.remove('active'));
  event.target.classList.add('active');
}

// Поиск
const searchInput = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");
searchInput.addEventListener("input", ()=>{
  const val = searchInput.value.toLowerCase();
  const matches = products.filter(p=>p.name.toLowerCase().includes(val));
  suggestions.innerHTML = "";
  if(val!==""){
    matches.forEach(p=>{
      const div = document.createElement("div");
      div.textContent = p.name;
      div.onclick = ()=>{ searchInput.value=p.name; filterSearch(); suggestions.style.display='none'; }
      suggestions.appendChild(div);
    });
    suggestions.style.display='block';
  } else suggestions.style.display='none';
});
function filterSearch(){
  const val = searchInput.value.toLowerCase();
  filteredProducts = products.filter(p=>p.name.toLowerCase().includes(val));
  render(filteredProducts);
}

// Фильтр цены
function filterPrice(){
  const min = Number(document.getElementById("priceMin").value)||0;
  const max = Number(document.getElementById("priceMax").value)||Infinity;
  filteredProducts = filteredProducts.filter(p=>p.price>=min && p.price<=max);
  render(filteredProducts);
}
// Админ
const admin_panel = document.getElementById("admin-panel");
function openAdmin(){ admin_panel.style.display="block"; }
function closeAdmin(){ admin_panel.style.display="none"; }
function saveProduct(){
  const newP = {
    id:Date.now(),
    name:document.getElementById("ad-title").value,
    price:Number(document.getElementById("ad-price").value),
    category:document.getElementById("ad-category").value,
    img:document.getElementById("ad-img").value,
    description:document.getElementById("ad-desc").value
  };
  products.push(newP);
  filteredProducts.push(newP);
  render(filteredProducts);
  closeAdmin();
}

render(filteredProducts);
// ===================== КОРЗИНА ==========================

// Открыть/закрыть корзину
function toggleCart() {
  document.getElementById("miniCart").classList.toggle("open");
};

// Добавить в корзину
let cart = JSON.parse(localStorage.getItem("cart")) || [];


function addToCart(product) {
  let exist = cart.find(p => p.id === product.id);

  if (exist) {
    exist.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  saveCart();
  updateMiniCart();
}

// Увеличить количество
function increaseQty(id) {
  let item = cart.find(p => p.id === id);
  item.qty++;
  updateCart();
}

// Уменьшить количество
function decreaseQty(id) {
  let item = cart.find(p => p.id === id);
  if (item.qty > 1) item.qty--;
  else cart = cart.filter(p => p.id !== id);
  updateCart();
}

// Обновление корзины
function updateMiniCart() {
  const mini = document.getElementById("cartItems");
  const total = document.getElementById("cartTotal");

  let totalPrice = 0;
  mini.innerHTML = "";

  cart.forEach(item => {
    totalPrice += item.price * item.qty;

    mini.innerHTML += `
      <div style="display:flex; gap:10px; align-items:center; padding:10px 0;">
        <img src="${item.img}" width="50">
        <div style="flex:1;">
          ${item.name} × 
          <button onclick="decreaseQty(${item.id})" style="padding:2px 6px;">-</button>
          ${item.qty}
          <button onclick="increaseQty(${item.id})" style="padding:2px 6px;">+</button>
        </div>
        <div>${item.price} ₸</div>
      </div>
    `;
  });

  total.textContent = totalPrice;
}

function increaseQty(id) {
  let item = cart.find(p => p.id === id);
  if (item) {
    item.qty++;
    saveCart();
    updateMiniCart();
  }
}

function decreaseQty(id) {
  let item = cart.find(p => p.id === id);
  if (item) {
    if (item.qty > 1) {
      item.qty--;
    } else {
      cart = cart.filter(p => p.id !== id);
    }
    saveCart();
    updateMiniCart();
  }
}

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function showProducts(list) {
  const productsDiv = document.getElementById("products");
  productsDiv.innerHTML = "";

  list.forEach(p => {
    // Используем JSON.stringify, чтобы передать весь объект
    productsDiv.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="title">${p.name}</div>
        <div class="price">${p.price} ₸</div>
        <button onclick='addToCart(${JSON.stringify(p)})'>В корзину</button>
      </div>
    `;
  });
}

function addToCart(product) {
  // Убедимся, что id есть
  if (!product.id) {
    product.id = Date.now(); // если нет id, создаём уникальный
  }

  let exist = cart.find(p => p.id === product.id);

  if (exist) {
    exist.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  saveCart();
  updateMiniCart();
}

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

// Старт
showProducts(products);
